{% extends 'base.html' %}

{% block content %}
<div class="form-wrap">
    <h2 class="mb-1">Add Meal</h2>
    <p class="text-muted mb-4">Save a meal so you can reuse it in your weekly planner.</p>

    <form method="POST" class="card app-form-card p-4">
        <div class="mb-3">
            <label class="form-label">Meal Name</label>
            <input type="text" name="name" class="form-control" placeholder="e.g. Chicken Salad" required>
        </div>

        <div class="mb-4">
            <label class="form-label">Category</label>
            <select name="category" class="form-select">
                <option value="breakfast">Breakfast</option>
                <option value="lunch">Lunch</option>
                <option value="dinner">Dinner</option>
            </select>
        </div>

        <div class="d-flex gap-2">
            <button class="btn btn-success app-btn-success">Save Meal</button>
            <a href="/meals" class="btn btn-outline-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
